name: Musinsa Price Tracker 2026

on:
  schedule:
    - cron: '0 0 * * *' # 매일 정오(UTC) 실행
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 2026년 공지사항에 따른 Node24 강제 사용 설정
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 안정적인 최신 파이썬 버전

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas matplotlib

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add price_history.csv price_chart.png
          git commit -m "Update price data: $(date +'%Y-%m-%d')" || exit 0
          git push
